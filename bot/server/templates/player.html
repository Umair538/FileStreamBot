<!DOCTYPE html>
<html lang="en">
<head>
    <title>Play Files</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="deny">

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Scripts -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: #000; font-family: Arial, sans-serif;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }

        #video-container {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        #stream-media { height: 100%; width: 100%; }

        #ad-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; background-color: black;
        }

        .stylish-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; z-index: 105; display: none;
        }

        .stylish-loader::before, .stylish-loader::after {
            content: ''; position: absolute; border-radius: 50%; border: 4px solid transparent;
        }

        .stylish-loader::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: #00b3ff; border-bottom-color: #00b3ff;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 15px rgba(0, 179, 255, 0.4);
        }

        .stylish-loader::after {
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-left-color: #ffffff; border-right-color: #ffffff;
            animation: spin 0.8s ease-in-out infinite reverse;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .custom-volume-control {
            position: absolute; top: 15px; right: 15px; z-index: 90;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 8px 4px; width: 32px; box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .volume-slider-wrapper {
            width: 100%; height: 0px; overflow: hidden;
            transition: height 0.4s ease, margin-bottom 0.4s ease;
            position: relative; display: flex; justify-content: center;
        }

        .custom-volume-control:hover .volume-slider-wrapper { height: 180px; margin-bottom: 12px; }

        .volume-slider {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            width: 170px; height: 5px; -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2); border-radius: 5px;
            outline: none; cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px #00b3ff;
            border: 2px solid #00b3ff;
        }

        .volume-icon { color: white; font-size: 16px; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; }

        #error-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4d4d; font-size: 22px; text-align: center;
            background: rgba(0, 0, 0, 0.8); padding: 15px 30px; border-radius: 8px; display: none; z-index: 90;
        }

        .plyr, .plyr__video-wrapper { height: 100%; width: 100%; }
    </style>
</head>

<body>
    <div id="video-container">
        <video id="stream-media" controls preload="auto" playsinline>
            <source src="" type="">
        </video>
        <div id="stylish-loader" class="stylish-loader"></div>
        <div id="ad-container"></div>
        <div id="error-message">Error: Media URL not provided</div>
    </div>

    <script>
        // --- 1. RESUME SYSTEM DATA ---
        var urlParams = new URLSearchParams(window.location.search);
        var startTime = parseFloat(urlParams.get('t')) || 0; // URL se 't' (seconds) uthana

        // --- 2. SECURITY & DECODING ---
        var _token = "{{ token }}"; 
        var mediaLink = "";
        try { mediaLink = atob(_token); } catch(e) { console.error("Token error"); }

        // --- 3. PLAYER INITIALIZATION ---
        var player = new Plyr('#stream-media', {
            controls:['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'settings', 'pip', 'fullscreen'],
            settings: ['speed', 'loop'],
            seekTime: 10,
        });

        const loader = document.getElementById('stylish-loader');
        const showLoader = () => loader.style.display = 'block';
        const hideLoader = () => loader.style.display = 'none';

        if (mediaLink) {
            document.querySelector('#stream-media source').setAttribute('src', mediaLink);
            showLoader(); 
            
            player.on('ready', function() {
                // AUTO-RESUME LOGIC
                if (startTime > 0) {
                    player.currentTime = startTime;
                    setTimeout(() => { player.play(); }, 500);
                }

                // --- 4. VOLUME CONTROL UI ---
                var volumeHtml = `
                    <div class="custom-volume-control" id="custom-vol-ctrl">
                        <div class="volume-slider-wrapper">
                            <input type="range" min="0" max="1" step="0.01" value="1" class="volume-slider" id="vol-slider">
                        </div>
                        <div class="volume-icon" id="vol-icon"><i class="fas fa-volume-up"></i></div>
                    </div>`;
                
                var wrapper = player.elements.container.querySelector('.plyr__video-wrapper');
                wrapper.insertAdjacentHTML('beforeend', volumeHtml);
                
                const volSlider = document.getElementById('vol-slider');
                volSlider.addEventListener('input', (e) => {
                    player.volume = parseFloat(e.target.value);
                });
            });

            // --- 5. PROGRESS TRACKING (SEND TO PARENT WEBSITE) ---
            setInterval(function() {
                if (player.playing) {
                    // Website ko exact time bhejna
                    window.parent.postMessage({
                        type: 'HS_VIDEO_PROGRESS',
                        time: player.currentTime,
                        duration: player.duration
                    }, '*');
                }
            }, 5000); // Har 5 second baad update

            player.on('loadstart', showLoader);   
            player.on('playing', hideLoader);     
            player.on('waiting', showLoader);     

        } else {
            document.getElementById('error-message').style.display = 'block';
        }

        // --- 6. VAST ADS INTEGRATION ---
        const VAST_TAG_URL = "https://fluffy-management.com/dImzF.zVd/GNNQv/ZbGNUx/febmV9euLZOUElNkjPbTmYS5/Mrj/kDzfMoDFUytTNQjgkayQO/TJMnwHOpSVZ_s/aUWV1/pld/Dy0-xi";
        let adsLoader, adsManager, adContainer = document.getElementById('ad-container'), videoElement = document.getElementById('stream-media');
        let hasPlayedPreRoll = false;

        function initIMA() {
            var adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, videoElement);
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, (e) => {
                adsManager = e.getAdsManager(videoElement);
                adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED, () => {
                    adContainer.style.display = 'none'; videoElement.play();
                });
                adsManager.init(videoElement.clientWidth, videoElement.clientHeight, google.ima.ViewMode.NORMAL);
                adsManager.start();
            });
            document.addEventListener('click', () => adDisplayContainer.initialize(), {once: true});
        }

        player.on('play', () => {
            if (!hasPlayedPreRoll) {
                hasPlayedPreRoll = true;
                adContainer.style.display = 'block';
                let adsRequest = new google.ima.AdsRequest();
                adsRequest.adTagUrl = VAST_TAG_URL;
                adsLoader.requestAds(adsRequest);
            }
        });

        initIMA();

        // --- 7. SECURITY ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    </script>
</body>
</html>
