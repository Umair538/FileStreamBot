<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Play Files</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="deny">

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <!-- Google IMA SDK (Ads chalane ke liye zaroori script) -->
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <style>
      html, body { margin: 0; height: 100%; background-color: #000; }
      #stream-media { height: 100%; width: 100%; }
      #error-message { color: red; font-size: 24px; text-align: center; margin-top: 20px; }
      
      .plyr__volume { max-width: initial; min-width: initial; width: auto; position: relative; }
      .plyr, .plyr__video-wrapper, .plyr__video-embed iframe { height: 100%; }

      /* ðŸ”¥ BEAUTIFUL CUSTOM PROGRESS / LOADER SPINNER ðŸ”¥ */
      .custom-loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #00e5ff; /* Cyan glowing color */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 100;
        display: none;
        box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #00e5ff;
        pointer-events: none;
      }

      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }

      /* Hide default Plyr loader */
      .plyr--loading .plyr__video-wrapper::before,
      .plyr--loading .plyr__video-wrapper::after {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <!-- PIP Mode disable karne ke liye disablePictureInPicture attribute add kiya gaya hai -->
    <video id="stream-media" controls preload="auto" disablePictureInPicture controlsList="nodownload">
      <source src="" type="">
      <p class="vjs-no-js">
        To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video
      </p>
    </video>

    <div id="error-message"></div>

    <script>
      var player = new Plyr('#stream-media', {
          // Controls se pip nikal diya gaya hai
          controls:['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'mute', 'settings', 'fullscreen'],
          settings: ['speed','loop'],
          speed: { selected: 1, options:[0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
          seek: 10,
          keyboard: { focused: true, global: true },
          
          // ðŸ”¥ VAST ADS KI SETTINGS ðŸ”¥
          ads: {
              enabled: true,
              publisherId: 'youtube-style-ads',
              // Har 20 minutes bad (Mid-roll) ad chalane ke liye aapko VAST ki jagah 'VMAP' link ka use karna chahiye jisme 20-min ke breaks set hon.
              tagUrl: 'YAHAN_APNA_VAST_YA_VMAP_TAG_LINK_PASTE_KAREIN' 
          }
      });

      var mediaLink = "{{ mediaLink }}";

      if (mediaLink) {
          document.querySelector('#stream-media source').setAttribute('src', mediaLink);
          
          // --- Custom Beautiful Spinner Logic ---
          var spinner = document.createElement('div');
          spinner.className = 'custom-loader';
          
          // Jab Plyr ready ho jaye tab spinner ko wrapper mein add karein
          player.on('ready', function() {
              player.elements.container.querySelector('.plyr__video-wrapper').appendChild(spinner);
          });

          // Video load ya buffer hone par spinner show karein
          player.on('waiting', function() { spinner.style.display = 'block'; });
          player.on('seeking', function() { spinner.style.display = 'block'; });
          
          // Video play hone par spinner hide karein
          player.on('playing', function() { spinner.style.display = 'none'; });
          player.on('canplay', function() { spinner.style.display = 'none'; });
          player.on('pause', function() { spinner.style.display = 'none'; });
          // --------------------------------------

          // --- 20 Minute Ad Tracking Logic ---
          var lastAdTime = 0;
          player.on('timeupdate', function() {
              var currentTime = Math.floor(player.currentTime);
              
              // 1200 seconds = 20 minutes
              // Agar video chalta hue 20 minutes guzar jayein:
              if (currentTime > 0 && currentTime % 1200 === 0 && (currentTime - lastAdTime) > 10) {
                  lastAdTime = currentTime;
                  console.log("20 Minute poore ho gaye!"); 
                  
                  // NOTE: Standard IMA SDK mein mid-rolls automatic VMAP ke zariye chalte hain.
                  // Agar aapke paas koi custom function hai jo ad chalata hai tou wo yahan call kar sakte hain.
              }
          });
          // ------------------------------------

      } else {
          document.getElementById('error-message').textContent = 'Error: Media URL not provided';
      }
    </script>
  </body>
</html>
