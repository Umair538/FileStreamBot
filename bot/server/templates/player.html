<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed Movie Player</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        .artplayer-app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="artplayer-app"></div>

    <!-- ArtPlayer Library -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

    <script>
        (function() {
            // Masked Token from Python
            var _rawToken = "{{ token }}"; 

            // Function to decode link just before play
            function _decodeSource(token) {
                try {
                    return atob(token);
                } catch(e) {
                    return "";
                }
            }

            // Initialize ArtPlayer
            const art = new Artplayer({
                container: '.artplayer-app',
                url: _decodeSource(_rawToken),
                type: 'mkv', // Support common movie formats
                title: 'Streaming Movie...',
                poster: '', 
                volume: 0.7,
                isLive: false,
                muted: false,
                autoplay: false,
                pip: true,
                autoSize: true,
                autoMini: true,
                screenshot: true,
                setting: true,
                loop: false,
                flip: true,
                playbackRate: true,
                aspectRatio: true,
                fullscreen: true,
                fullscreenWeb: true,
                subtitleOffset: true,
                miniProgressBar: true,
                mutex: true,
                backdrop: true,
                playsInline: true,
                autoPlayback: true,
                airplay: true,
                theme: '#ff0000',
                moreVideoAttr: {
                    controlsList: 'nodownload', // Browser ka download button hide karega
                    playsInline: true,
                },
                settings: [
                    {
                        width: 200,
                        html: 'Video Quality',
                        tooltip: 'Original',
                    },
                ],
            });

            // --- SECURITY: Disable Right Click & Inspect ---
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                    return false;
                }
            };

            // Player Ready
            art.on('ready', () => {
                console.info('Player is ready for movie streaming');
            });

        })();
    </script>
</body>
</html>
