<!DOCTYPE html>
<html lang="en">
<head>
    <title>Play Files</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="deny">

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Scripts -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <!-- Google IMA SDK for VAST Ads -->
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #stream-media {
            height: 100%;
            width: 100%;
        }

        /* Ad Container */
        #ad-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none;
            background-color: black;
        }

        /* ------------------------------------- */
        /* STYLISH DUAL-RING LOADER              */
        /* ------------------------------------- */
        .stylish-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 105;
            display: none; /* JS will handle this */
        }

        .stylish-loader::before, .stylish-loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 4px solid transparent;
        }

        .stylish-loader::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: #00b3ff;
            border-bottom-color: #00b3ff;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 15px rgba(0, 179, 255, 0.4);
        }

        .stylish-loader::after {
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-left-color: #ffffff;
            border-right-color: #ffffff;
            animation: spin 0.8s ease-in-out infinite reverse;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ------------------------------------- */
        /* SLIM & TALL VOLUME POPUP              */
        /* ------------------------------------- */
        .custom-volume-control {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 8px 4px; /* Reduced width padding */
            width: 32px;      /* Fixed narrow width */
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .volume-slider-wrapper {
            width: 100%;
            height: 0px;
            overflow: hidden;
            transition: height 0.4s ease, margin-bottom 0.4s ease;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* Increased Height for the Volume Slider */
        .custom-volume-control:hover .volume-slider-wrapper {
            height: 180px; /* Taller height */
            margin-bottom: 12px;
        }

        .volume-slider {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            width: 170px; /* Slider actual length */
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00b3ff;
            border: 2px solid #00b3ff;
            transition: transform 0.1s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .volume-icon {
            color: white;
            font-size: 16px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.3s;
        }

        .custom-volume-control:hover .volume-icon {
            color: #00b3ff;
        }

        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4d4d;
            font-size: 22px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
            z-index: 90;
        }

        .plyr, .plyr__video-wrapper, .plyr__video-embed iframe {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <!-- Main Video -->
        <video id="stream-media" controls preload="auto" playsinline>
            <source src="" type="">
        </video>
        
        <!-- Stylish Dual-Ring Loader -->
        <div id="stylish-loader" class="stylish-loader"></div>
        
        <!-- VAST Ad Container -->
        <div id="ad-container"></div>
        
        <!-- Error Message -->
        <div id="error-message">Error: Media URL not provided</div>
    </div>

    <script>
        var mediaLink = "{{ mediaLink }}"; 

        var player = new Plyr('#stream-media', {
            controls:['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'settings', 'pip', 'fullscreen'],
            settings: ['speed', 'loop'],
            speed: { selected: 1, options:[0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
            seekTime: 10,
            keyboard: { focused: true, global: true },
        });

        const loader = document.getElementById('stylish-loader');

        // Functions to Control Loader Logic Easily
        const showLoader = () => loader.style.display = 'block';
        const hideLoader = () => loader.style.display = 'none';

        if (mediaLink) {
            document.querySelector('#stream-media source').setAttribute('src', mediaLink);
            showLoader(); // Show loader initially while media sets up
            
            // Custom Volume Popup Logic
            player.on('ready', function() {
                var volumeHtml = `
                    <div class="custom-volume-control" id="custom-vol-ctrl">
                        <div class="volume-slider-wrapper">
                            <input type="range" min="0" max="1" step="0.01" value="1" class="volume-slider" id="vol-slider">
                        </div>
                        <div class="volume-icon" id="vol-icon">
                            <i class="fas fa-volume-up"></i>
                        </div>
                    </div>
                `;
                
                var wrapper = player.elements.container.querySelector('.plyr__video-wrapper');
                wrapper.insertAdjacentHTML('beforeend', volumeHtml);
                
                const customVolCtrl = document.getElementById('custom-vol-ctrl');
                const volSlider = document.getElementById('vol-slider');
                const volIcon = document.getElementById('vol-icon');
                const volIconI = volIcon.querySelector('i');
                let lastVol = 1;

                // Fix: Prevent volume clicks from pausing the video
                customVolCtrl.addEventListener('mousedown', (e) => e.stopPropagation());
                customVolCtrl.addEventListener('click', (e) => e.stopPropagation());
                customVolCtrl.addEventListener('dblclick', (e) => e.stopPropagation());

                // Apply Dynamic Gradient Fill on Slider
                function updateSliderFill(value) {
                    const percentage = value * 100;
                    volSlider.style.background = `linear-gradient(to right, #00b3ff ${percentage}%, rgba(255,255,255,0.2) ${percentage}%)`;
                }

                volSlider.addEventListener('input', (e) => {
                    player.volume = parseFloat(e.target.value);
                    updateVolUI();
                });

                customVolCtrl.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        player.volume = Math.min(1, player.volume + 0.05);
                    } else {
                        player.volume = Math.max(0, player.volume - 0.05);
                    }
                    volSlider.value = player.volume;
                    updateVolUI();
                });

                volIcon.addEventListener('click', () => {
                    if (player.volume > 0) {
                        lastVol = player.volume;
                        player.volume = 0;
                    } else {
                        player.volume = lastVol > 0 ? lastVol : 1;
                    }
                    volSlider.value = player.volume;
                    updateVolUI();
                });

                player.on('volumechange', () => {
                    volSlider.value = player.volume;
                    updateVolUI();
                });

                function updateVolUI() {
                    updateSliderFill(volSlider.value);
                    if (player.volume === 0 || player.muted) {
                        volIconI.className = 'fas fa-volume-mute';
                    } else if (player.volume < 0.5) {
                        volIconI.className = 'fas fa-volume-down';
                    } else {
                        volIconI.className = 'fas fa-volume-up';
                    }
                }
                
                updateSliderFill(1); // Initialize gradient
            });

            // --- STRICT LOADER LOGIC (Network / Playback Sync) ---
            player.on('loadstart', showLoader);   // When video starts to load from internet
            player.on('waiting', showLoader);     // When video stops buffering
            player.on('seeking', showLoader);     // When user scrubs timeline
            
            player.on('playing', hideLoader);     // ONLY hide when it physically plays
            player.on('pause', hideLoader);       // Hide if paused manually by user

        } else {
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('stream-media').style.display = 'none';
        }

        // ==========================================
        // VAST AD INTEGRATION WITH NEW URL
        // ==========================================
        const VAST_TAG_URL = "https://fluffy-management.com/dImzF.zVd/GNNQv/ZbGNUx/febmV9euLZOUElNkjPbTmYS5/Mrj/kDzfMoDFUytTNQjgkayQO/TJMnwHOpSVZ_s/aUWV1/pld/Dy0-xi";
        
        let adDisplayContainer;
        let adsLoader;
        let adsManager;
        let adContainer = document.getElementById('ad-container');
        let videoElement = document.getElementById('stream-media');
        
        let isAdPlaying = false;
        let hasPlayedPreRoll = false;
        let lastAdTime = 0;
        let adCooldown = 60000; // 1 min cooldown for seeking

        function initIMA() {
            google.ima.settings.setVpaidMode(google.ima.ImaSdkSettings.VpaidMode.ENABLED);
            adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, videoElement);
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded, false);
            adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError, false);

            const initAdsOnce = () => {
                adDisplayContainer.initialize();
                document.removeEventListener('click', initAdsOnce);
                document.removeEventListener('touchstart', initAdsOnce);
            };
            document.addEventListener('click', initAdsOnce);
            document.addEventListener('touchstart', initAdsOnce);
        }

        function requestAd() {
            if (isAdPlaying) return;
            isAdPlaying = true;
            
            let adsRequest = new google.ima.AdsRequest();
            adsRequest.adTagUrl = VAST_TAG_URL;
            adsRequest.linearAdSlotWidth = videoElement.clientWidth;
            adsRequest.linearAdSlotHeight = videoElement.clientHeight;
            adsRequest.nonLinearAdSlotWidth = videoElement.clientWidth;
            adsRequest.nonLinearAdSlotHeight = videoElement.clientHeight;
            
            adContainer.style.display = 'block';
            showLoader(); // Show loader while fetching ad from network
            
            adsLoader.requestAds(adsRequest);
        }

        function onAdsManagerLoaded(adsManagerLoadedEvent) {
            let adsRenderingSettings = new google.ima.AdsRenderingSettings();
            adsManager = adsManagerLoadedEvent.getAdsManager(videoElement, adsRenderingSettings);
            adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
            
            adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_PAUSE_REQUESTED, () => {
                let playPromise = videoElement.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => { videoElement.pause(); }).catch(e => console.log("Safe pause"));
                } else {
                    videoElement.pause();
                }
            });
            
            adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED, resumeMainVideo);
            adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, resumeMainVideo);
            
            adsManager.addEventListener(google.ima.AdEvent.Type.LOADED, () => {
                hideLoader(); // Hide loader when ad is ready and playing
                lastAdTime = Date.now();
            });

            try {
                adsManager.init(videoElement.clientWidth, videoElement.clientHeight, google.ima.ViewMode.NORMAL);
                adsManager.start();
            } catch (adError) {
                onAdError(adError);
            }
        }

        function onAdError(adErrorEvent) {
            console.log("Ad Error / Empty Tag - Resuming Video:", adErrorEvent.getError());
            if (adsManager) adsManager.destroy();
            resumeMainVideo();
        }

        function resumeMainVideo() {
            isAdPlaying = false;
            adContainer.style.display = 'none';
            hideLoader();
            
            if (videoElement.paused) {
                videoElement.play().catch(e => console.log("Play issue:", e));
            }
        }

        // --- TRIGGERS ---
        initIMA();

        player.on('play', () => {
            if (!hasPlayedPreRoll) {
                hasPlayedPreRoll = true;
                requestAd();
            }
        });

        player.on('seeking', () => {
            if (!hasPlayedPreRoll || isAdPlaying) return;
            let currentTime = Date.now();
            if (currentTime - lastAdTime > adCooldown) {
                lastAdTime = currentTime;
                requestAd();
            }
        });

        setInterval(() => {
            if (hasPlayedPreRoll && !isAdPlaying) {
                requestAd();
            }
        }, 20 * 60 * 1000); // 20 minutes

        window.addEventListener('resize', () => {
            if (adsManager) {
                adsManager.resize(videoElement.clientWidth, videoElement.clientHeight, google.ima.ViewMode.NORMAL);
            }
        });

    </script>
</body>
</html>
