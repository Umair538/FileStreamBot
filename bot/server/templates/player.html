<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Player</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        /* Hide context menu to prevent "Copy Video Address" */
        video {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <video id="player" playsinline controls disablePictureInPicture controlsList="nodownload">
        <!-- Source is empty initially -->
    </video>
</div>

<!-- Plyr JS -->
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    (function() {
        // 1. Get the encoded token from Python (Base64)
        var _0x5f21 = "{{ token }}"; 

        // 2. Decode the link only inside this protected function
        function getSource() {
            return atob(_0x5f21);
        }

        // 3. Initialize Player
        const videoElement = document.getElementById('player');
        const player = new Plyr(videoElement, {
            controls: [
                'play-large', 'play', 'progress', 'current-time', 
                'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'
            ],
            keyboard: { focused: true, global: true }
        });

        // 4. Inject original link dynamically
        videoElement.src = getSource();

        // 5. Extra Security: Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 6. Protect from Inspect Element
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // View Source
        };
    })();
</script>

</body>
</html>
